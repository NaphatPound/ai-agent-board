<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Runner — Terminal Viewer</title>
  <meta name="description" content="POC Backend to run Claude Code CLI with a live web terminal viewer. Submit tasks and watch Claude Code work in real-time." />

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- ─── Sidebar ──────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <h1>Claude Runner</h1>
        </div>
        <button class="btn btn-primary btn-new-task" id="btnNewTask" title="New Task">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>New Task</span>
        </button>
      </div>

      <div class="task-list-container">
        <div class="task-list-header">
          <span>Tasks</span>
          <button class="btn-icon" id="btnRefresh" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M14 2v4h-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="task-list" id="taskList">
          <div class="empty-state">
            <span class="empty-icon">📋</span>
            <p>No tasks yet</p>
            <p class="sub">Click "New Task" to get started</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- ─── Mobile Tab Bar ──────────────────────── -->
    <nav class="mobile-tab-bar" id="mobileTabBar">
      <button class="mobile-tab active" data-tab="tasks">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 8.5h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Tasks</span>
      </button>
      <button class="mobile-tab" data-tab="terminal">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 6l2.5 2L4 10M8 10h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Terminal</span>
      </button>
    </nav>

    <!-- ─── Mobile Floating New Task Button ──── -->
    <button class="mobile-fab" id="mobileFab" title="New Task">
      <svg width="24" height="24" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <!-- ─── Main Content ─────────────────────── -->
    <main class="main-content">
      <div class="terminal-header" id="terminalHeader">
        <div class="terminal-title">
          <span class="terminal-dot dot-red"></span>
          <span class="terminal-dot dot-yellow"></span>
          <span class="terminal-dot dot-green"></span>
          <span class="terminal-title-text" id="terminalTitle">Select a task to view output</span>
        </div>
        <div class="terminal-actions">
          <span class="task-status-badge" id="terminalStatus" style="display:none;"></span>
          <button class="btn btn-danger btn-sm" id="btnStopTask" style="display:none;" title="Stop Task">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="10" height="10" rx="1" fill="currentColor"/></svg>
            Stop
          </button>
          <button class="btn btn-ghost btn-sm" id="btnClearTerminal" title="Clear Terminal">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1M6 7v5M10 7v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="terminal-container" id="terminalContainer">
        <div id="terminal"></div>
      </div>
    </main>
  </div>

  <!-- ─── New Task Modal ─────────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2>⚡ New Task</h2>
        <button class="btn-icon" id="btnCloseModal" title="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <form id="taskForm">
        <div class="form-group">
          <label for="taskPrompt">Task Prompt</label>
          <textarea id="taskPrompt" placeholder="Describe what you want Claude Code to do...&#10;&#10;Example: Create a simple Express server with a health check endpoint" rows="6" required></textarea>
        </div>
        <div class="form-group">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="">Default (Claude)</option>
          </select>
          <span class="form-hint">AI model to use (passed as --model flag)</span>
        </div>
        <div class="form-group">
          <label for="workingDir">Working Directory</label>
          <input type="text" id="workingDir" placeholder="e.g. G:\project\my-project (leave blank for server's CWD)" />
          <span class="form-hint">The directory Claude Code will work in</span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="btnCancelModal">Cancel</button>
          <button type="submit" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8l5 5L14 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Run Task
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
